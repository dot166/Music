name: Build application

on: [pull_request, push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17
          cache: gradle
      - name: Configure git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Build with Gradle
        run: ./gradlew assembleRelease
      - name: send to repo and prebuilt
        if: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.repository == 'dot166/Music' }}
        run: |
          echo "${{ secrets.KEYSTORE }}" > a.txt
          base64 -d a.txt > key.jks
          echo "${{ secrets.KEYSTORE_PROPS }}" > b.txt
          base64 -d b.txt > keystore.properties
          ./gradlew assembleRelease # rebuild so it is actually signed
          export VER=$(jq '.elements[0].versionCode' app/build/outputs/apk/release/output-metadata.json)
          echo $VER
          mkdir -p artifacts/apps/packages/com.android.music/$VER
          echo "channel = \"stable"\" > artifacts/apps/packages/com.android.music/$VER/channel.toml
          cp app/build/outputs/apk/release/app-release.apk artifacts/apps/packages/com.android.music/$VER/base.apk
          cp app/build/outputs/apk/release/app-release.apk.idsig artifacts/apps/packages/com.android.music/$VER/base.apk.idsig
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/dot166/apks.git apks
          cp -r artifacts/* apks/
          cd apks
          git add .
          git commit -m "Music $VER"
          git push origin
          cd ..
          rm -rf artifacts
          rm -rf apks
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/dot166/platform_external_Music.git prebuilt
          cp app/build/outputs/apk/release/app-release.apk prebuilt/prebuilt/
          cp app/build/outputs/apk/release/app-release.apk.idsig prebuilt/prebuilt/
          cd prebuilt
          git add .
          git commit -m "Music $VER"
          git push origin
          cd ..
          rm -rf prebuilt
          git tag -s $VER -m $VER
          git push origin $VER
